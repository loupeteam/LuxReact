name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        # Use `npm install` (not `npm ci`) to work around npm/cli#4828: lockfiles
        # generated on Windows don't include the linux-specific rollup native
        # binary, causing `npm ci` to leave it missing.
        run: |
          rm -f package-lock.json
          npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run
